name: easy_hr
description: Easy HR - Myanmar SME HR Management App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.6.0

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Navigation
  go_router: ^14.8.1

  # Network
  dio: ^5.7.0

  # Local Storage
  shared_preferences: ^2.3.4
  flutter_secure_storage: ^9.2.4

  # UI Components
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.17
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  lottie: ^3.3.1

  # Location & Maps
  geolocator: ^13.0.2
  google_maps_flutter: ^2.10.0

  # QR Code
  qr_flutter: ^4.1.0
  mobile_scanner: ^6.0.5

  # Charts
  fl_chart: ^0.70.2

  # PDF
  pdf: ^3.11.2
  printing: ^5.13.5

  # Notifications & Auth
  firebase_core: ^3.9.0
  firebase_auth: ^5.3.4
  firebase_messaging: ^15.2.0
  flutter_local_notifications: ^18.0.1
  workmanager: ^0.5.2
  timezone: ^0.9.4

  # Utils
  intl: ^0.19.0
  image_picker: ^1.1.2
  permission_handler: ^11.3.1
  url_launcher: ^6.3.1
  pull_to_refresh: ^2.0.0

  # Icons
  cupertino_icons: ^1.0.8
  iconsax: ^0.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/